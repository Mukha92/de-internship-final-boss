apiVersion: 1

providers:
  - name: 'Raw Layer Dashboards'
    orgId: 1
    folder: 'ETL Monitoring'
    folderUid: 'etl-monitoring'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
